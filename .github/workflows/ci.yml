name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  # -----------------------------------------------------------------------
  # Backend: lint + unit tests
  # -----------------------------------------------------------------------
  backend-test:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Semifinal/project/server（云端服务）

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "Semifinal/project/server（云端服务）/requirements-dev.txt"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=60

  # -----------------------------------------------------------------------
  # Frontend: build check
  # -----------------------------------------------------------------------
  frontend-build:
    name: Frontend Build (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "Semifinal/project/Distributed_Emergency_Response_System（可视化web端）"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "Semifinal/project/Distributed_Emergency_Response_System（可视化web端）/package-lock.json"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  # -----------------------------------------------------------------------
  # Docker build smoke test
  # -----------------------------------------------------------------------
  docker-build:
    name: Docker Build (Server)
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Build server Docker image
        run: |
          docker build \
            -t lifereflexarc/server:${{ github.sha }} \
            Semifinal/project/server（云端服务）
